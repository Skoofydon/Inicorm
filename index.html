<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brawl Stars Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }

        /* Анимации */
        @keyframes coinAnimation {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-50px) rotate(180deg); opacity: 0.8; }
            100% { transform: translateY(0) rotate(360deg); opacity: 1; }
        }

        @keyframes buttonPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 107, 53, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0); }
        }

        @keyframes shine {
            0% { background-position: -500px 0; }
            100% { background-position: 500px 0; }
        }

        .coin-animation {
            animation: coinAnimation 0.5s ease-out;
            display: inline-block;
        }

        .pulse-button {
            animation: buttonPulse 2s infinite;
        }

        .shine-button {
            background: linear-gradient(90deg, #ff6b35, #ff8c52, #ff6b35);
            background-size: 200% auto;
            animation: shine 3s linear infinite;
            border: none;
            color: white;
            cursor: pointer;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 3px solid #ff6b35;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff6b35, transparent, #ff6b35);
            animation: shine 2s linear infinite;
        }

        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .coins {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #buy-premium {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 107, 53, 0.5);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .tab-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            pointer-events: none;
        }

        .tab-button:hover::after {
            left: 100%;
        }

        .tab-button.active {
            background: #ff6b35;
            border-color: #ff6b35;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        #progress-chart, #fighter-recommendations, #battle-log {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .input-group {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        input, button {
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid rgba(255, 107, 53, 0.5);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
        }

        input:focus, button:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
        }

        .reward-day {
            padding: 15px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .reward-claimed {
            background: #4CAF50 !important;
            border-color: #2E7D32;
        }

        .reward-day:hover {
            transform: translateY(-3px);
            background: rgba(255, 107, 53, 0.2);
        }

        /* Настройки тем */
        .theme-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(26, 26, 46, 0.9);
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #ff6b35;
        }

        .theme-option {
            padding: 8px 15px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }
