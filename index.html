<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Список задач с процентовкой</title>
    <style>
        /* ==================== ОСНОВНЫЕ ПЕРЕМЕННЫЕ ==================== */
        :root {
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            --transition-speed: 0.3s;
            --radius-sm: 14px;
            --radius: 20px;
            --radius-lg: 26px;
            --radius-xl: 34px;
            --shadow-btn: 0 8px 20px rgba(0,0,0,0.25);
            --shadow-card: 0 12px 36px rgba(0,0,0,0.2);
            --backdrop-blur: 24px;
            --btn-gradient: linear-gradient(145deg, #ffffff30, #ffffff10);
        }

        /* ==================== ТЕМЫ ==================== */
        [data-theme="dark"] {
            --bg: #0e0e1a;
            --bg-secondary: #161630;
            --card-bg: rgba(30, 30, 55, 0.65);
            --card-bg-hover: rgba(40, 40, 70, 0.75);
            --text: #f0f0fa;
            --text-secondary: #b0b0d0;
            --text-tertiary: #7a7aa0;
            --accent: #8b7cf6;
            --accent-glow: rgba(139, 124, 246, 0.5);
            --border: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.18);
            --modal-overlay: rgba(0,0,0,0.7);
            --tab-bg: rgba(20,20,45,0.85);
            --tab-active: #8b7cf6;
            --danger: #ff4757;
            --danger-hover: #ff6b7a;
            --success: #2ed573;
            --success-glow: rgba(46,213,115,0.45);
            --warning: #ffa502;
            --input-bg: rgba(20,20,50,0.7);
            --particle-colors: #8b7cf6, #2ed573, #ffa502, #ff4757;
            --btn-gradient: linear-gradient(145deg, #ffffff15, #ffffff05);
            --btn-shadow: 0 6px 18px rgba(0,0,0,0.4);
        }
        [data-theme="light"] {
            --bg: #f2f2f7;
            --bg-secondary: #e5e5ea;
            --card-bg: rgba(255,255,255,0.8);
            --card-bg-hover: rgba(255,255,255,0.95);
            --text: #1c1c1e;
            --text-secondary: #636366;
            --text-tertiary: #aeaeb8;
            --accent: #007aff;
            --accent-glow: rgba(0,122,255,0.3);
            --border: rgba(0,0,0,0.05);
            --border-strong: rgba(0,0,0,0.12);
            --modal-overlay: rgba(0,0,0,0.35);
            --tab-bg: rgba(255,255,255,0.9);
            --tab-active: #007aff;
            --danger: #ff3b30;
            --danger-hover: #ff6259;
            --success: #34c759;
            --success-glow: rgba(52,199,89,0.35);
            --warning: #ff9500;
            --input-bg: rgba(240,240,248,0.9);
            --particle-colors: #007aff, #34c759, #ff9500, #ff3b30;
            --btn-gradient: linear-gradient(145deg, #ffffff, #f2f2f7);
            --btn-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }
        [data-theme="neon"] {
            --bg: #050510;
            --bg-secondary: #0a0a18;
            --card-bg: rgba(15,15,35,0.6);
            --card-bg-hover: rgba(25,25,50,0.7);
            --text: #f0f0ff;
            --text-secondary: #c0c0ff;
            --text-tertiary: #8080cc;
            --accent: #ff00ff;
            --accent-glow: rgba(255,0,255,0.7);
            --border: rgba(255,0,255,0.2);
            --border-strong: rgba(255,0,255,0.4);
            --modal-overlay: rgba(0,0,0,0.85);
            --tab-bg: rgba(8,8,22,0.9);
            --tab-active: #ff00ff;
            --danger: #ff1744;
            --danger-hover: #ff4d6a;
            --success: #00ff88;
            --success-glow: rgba(0,255,136,0.7);
            --warning: #ffaa00;
            --input-bg: rgba(10,10,25,0.8);
            --particle-colors: #ff00ff, #00ffff, #ffaa00, #00ff88;
            --btn-gradient: linear-gradient(145deg, #ffffff10, #ffffff05);
            --btn-shadow: 0 6px 20px rgba(255,0,255,0.3);
        }
        [data-theme="glass"] {
            --bg: #c8c8e0;
            --bg-secondary: rgba(255,255,255,0.25);
            --card-bg: rgba(255,255,255,0.35);
            --card-bg-hover: rgba(255,255,255,0.5);
            --text: #12122a;
            --text-secondary: #4a4a6a;
            --text-tertiary: #8888aa;
            --accent: #5856d6;
            --accent-glow: rgba(88,86,214,0.4);
            --border: rgba(255,255,255,0.5);
            --border-strong: rgba(255,255,255,0.7);
            --modal-overlay: rgba(0,0,0,0.45);
            --tab-bg: rgba(255,255,255,0.5);
            --tab-active: #5856d6;
            --danger: #ff3b30;
            --danger-hover: #ff6259;
            --success: #30d158;
            --success-glow: rgba(48,209,88,0.4);
            --warning: #ff9f0a;
            --input-bg: rgba(255,255,255,0.45);
            --particle-colors: #ffffff, #d0d0ff, #e0c0ff, #c0ffd0;
            --btn-gradient: linear-gradient(145deg, #ffffff60, #ffffff30);
            --btn-shadow: 0 8px 24px rgba(0,0,0,0.15);
            --backdrop-blur: 32px;
        }
        [data-theme="space"] {
            --bg: #020616;
            --bg-secondary: #0a1028;
            --card-bg: rgba(15,25,55,0.7);
            --card-bg-hover: rgba(20,35,70,0.8);
            --text: #d0d8ff;
            --text-secondary: #9098c8;
            --text-tertiary: #5a6090;
            --accent: #6d63ff;
            --accent-glow: rgba(109,99,255,0.6);
            --border: rgba(109,99,255,0.15);
            --border-strong: rgba(109,99,255,0.3);
            --modal-overlay: rgba(0,0,0,0.8);
            --tab-bg: rgba(5,8,25,0.9);
            --tab-active: #6d63ff;
            --danger: #ff4d6a;
            --danger-hover: #ff7a90;
            --success: #4df0a0;
            --success-glow: rgba(77,240,160,0.6);
            --warning: #f0c040;
            --input-bg: rgba(8,14,30,0.8);
            --particle-colors: #6d63ff, #4df0a0, #f0c040, #ff4d6a;
            --btn-gradient: linear-gradient(145deg, #ffffff10, #ffffff05);
            --btn-shadow: 0 6px 18px rgba(0,0,0,0.5);
            --star-opacity: 0.9;
        }
        [data-theme="pastel"] {
            --bg: #f8f2ed;
            --bg-secondary: #f0e8e0;
            --card-bg: rgba(255,250,248,0.85);
            --card-bg-hover: rgba(255,245,240,0.95);
            --text: #5d4e4e;
            --text-secondary: #8c7a7a;
            --text-tertiary: #b8a8a8;
            --accent: #c9a8a8;
            --accent-glow: rgba(201,168,168,0.5);
            --border: rgba(201,168,168,0.3);
            --border-strong: rgba(201,168,168,0.5);
            --modal-overlay: rgba(0,0,0,0.3);
            --tab-bg: rgba(255,250,248,0.9);
            --tab-active: #c9a8a8;
            --danger: #e07b7b;
            --danger-hover: #eb9a9a;
            --success: #8fc9a8;
            --success-glow: rgba(143,201,168,0.5);
            --warning: #e0c090;
            --input-bg: rgba(255,250,248,0.8);
            --particle-colors: #e0c090, #c9a8a8, #8fc9a8, #e07b7b;
            --btn-gradient: linear-gradient(145deg, #ffffff, #f8f2ed);
            --btn-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        /* Общие стили начнутся во второй части */
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <div id="app">
        <div class="content">
            <div class="header">
                <h1>📋 Задачи</h1>
                <div class="theme-toggle" id="themeToggle" title="Сменить тему">🎨</div>
            </div>
            <div class="toolbar">
                <select id="categoryFilter"><option value="all">Все категории</option></select>
                <select id="sortSelect">
                    <option value="date-desc">Новые сверху</option>
                    <option value="progress-desc">По прогрессу ↓</option>
                    <option value="deadline-asc">По дедлайну ↑</option>
                </select>
            </div>
            <div class="toolbar filter-group" id="statusFilters">
                <button class="active" data-filter="all">Все</button>
                <button data-filter="active">Активные</button>
                <button data-filter="completed">Выполненные</button>
                <button data-filter="overdue">Просроченные</button>
            </div>
            <div id="page-tasks" class="page active">
                <div class="task-list" id="taskList"></div>
                <button class="btn btn-primary" id="addTaskBtn" style="margin-top: 20px; width: 100%;">➕ Новая задача</button>
            </div>
            <div id="page-stats" class="page">
                <h2 style="margin-bottom:20px;">📊 Статистика</h2>
                <div class="stats-grid" id="statsGrid"></div>
                <h3 style="margin:20px 0 8px;">📈 Выполнено за 7 дней</h3>
                <canvas id="weeklyChart" width="300" height="150"></canvas>
                <h3 style="margin:20px 0 8px;">🗂️ Задачи по категориям</h3>
                <canvas id="categoryChart" width="200" height="200"></canvas>
            </div>
            <div id="page-settings" class="page">
                <h2 style="margin-bottom:20px;">⚙️ Настройки</h2>
                <div class="settings-group">
                    <label>Тема оформления</label>
                    <select id="themeSelect" style="width:100%; padding:14px; border-radius:30px; margin-top:8px;">
                        <option value="dark">Тёмная</option>
                        <option value="light">Светлая</option>
                        <option value="neon">Неон</option>
                        <option value="glass">Стеклянная (iOS)</option>
                        <option value="space">Космическая</option>
                        <option value="pastel">Пастельная</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label>Управление категориями</label>
                    <div style="display:flex; gap:8px; margin-top:8px;">
                        <input type="text" id="newCategoryInput" placeholder="Новая категория" style="flex:1; padding:14px; border-radius:30px;">
                        <button id="addCategoryBtn" class="btn btn-primary" style="flex:0;">+</button>
                    </div>
                    <ul id="categoryList" style="list-style:none; margin-top:12px;"></ul>
                </div>
                <div class="settings-group export-import">
                    <button id="exportBtn" class="btn btn-secondary">📤 Экспорт JSON</button>
                    <button id="importBtn" class="btn btn-secondary">📥 Импорт JSON</button>
                    <input type="file" id="importFile" accept=".json" style="display:none;">
                </div>
            </div>
        </div>
        <div class="tab-bar">
            <div class="tab-item active" data-page="tasks"><span class="tab-icon">📝</span> Задачи</div>
            <div class="tab-item" data-page="stats"><span class="tab-icon">📊</span> Статистика</div>
            <div class="tab-item" data-page="settings"><span class="tab-icon">⚙️</span> Настройки</div>
        </div>
    </div>

    <!-- Модальное окно добавления/редактирования задачи (ОБНОВЛЕНО) -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 id="modalTitle">Новая задача</h2>
            <div class="input-group"><label>Название *</label><input type="text" id="modalName" placeholder="Обязательно"></div>
            <div class="input-group"><label>Описание</label><textarea id="modalDesc" rows="2" placeholder="Необязательно"></textarea></div>
            <div class="input-group"><label>Категория</label><select id="modalCategory"></select></div>
            <div class="input-group"><label>Дедлайн</label><input type="date" id="modalDeadline"></div>
            
            <!-- Новый переключатель режима прогресса -->
            <div class="input-group">
                <label>Режим прогресса</label>
                <div class="mode-switch">
                    <label class="radio-label"><input type="radio" name="progressMode" value="manual" checked> Ручной процент</label>
                    <label class="radio-label"><input type="radio" name="progressMode" value="auto"> Авто по цели</label>
                </div>
            </div>
            <!-- Блок ручного выбора процента -->
            <div class="input-group" id="manualPercentBlock">
                <label>Прогресс</label>
                <div class="percent-selector" id="percentSelector">
                    <span class="percent-option" data-val="0">0%</span>
                    <span class="percent-option" data-val="25">25%</span>
                    <span class="percent-option" data-val="50">50%</span>
                    <span class="percent-option" data-val="75">75%</span>
                    <span class="percent-option selected" data-val="100">100%</span>
                </div>
            </div>
            <!-- Блок автоматического расчёта по цели (скрыт по умолчанию) -->
            <div class="input-group" id="autoPercentBlock" style="display:none;">
                <label>Цель</label>
                <input type="number" id="modalTarget" step="any" min="0.01" placeholder="Например, 10000">
                <label style="margin-top:10px;">Выполнено</label>
                <input type="number" id="modalCompleted" step="any" min="0" placeholder="0">
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelModalBtn">Отмена</button>
                <button class="btn btn-primary" id="saveModalBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно подтверждения удаления (без изменений) -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <h2>Удалить задачу?</h2>
            <p style="text-align:center; margin:16px 0;">Это действие нельзя отменить.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelConfirmBtn">Отмена</button>
                <button class="btn btn-primary" id="confirmDeleteBtn" style="background:var(--danger);">Удалить</button>
            </div>
        </div>
    </div>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background var(--transition-speed), color var(--transition-speed);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        #app {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            position: relative;
            padding-bottom: 110px;
            background: transparent;
            z-index: 1;
        }
        canvas#particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .content {
            position: relative;
            z-index: 1;
            padding: 24px 18px 30px;
        }

        /* ---------- ШАПКА ---------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .theme-toggle {
            background: var(--card-bg);
            backdrop-filter: blur(var(--backdrop-blur));
            -webkit-backdrop-filter: blur(var(--backdrop-blur));
            border: 1px solid var(--border-strong);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            color: var(--text);
            box-shadow: var(--btn-shadow);
            transition: all 0.25s;
        }
        .theme-toggle:active {
            transform: scale(0.9);
            background: var(--card-bg-hover);
        }

        /* ---------- ИНСТРУМЕНТЫ ---------- */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }
        .toolbar select, .toolbar button {
            background: var(--card-bg);
            backdrop-filter: blur(var(--backdrop-blur));
            -webkit-backdrop-filter: blur(var(--backdrop-blur));
            border: 1px solid var(--border-strong);
            border-radius: 30px;
            padding: 12px 18px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            font-family: var(--font);
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            background: var(--btn-gradient);
            transition: all 0.25s;
        }
        .toolbar select:focus, .toolbar button:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }
        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .filter-group button {
            border-radius: 30px;
            padding: 10px 16px;
            font-weight: 600;
            background: var(--card-bg);
            backdrop-filter: blur(var(--backdrop-blur));
            border: 1px solid var(--border);
            box-shadow: var(--btn-shadow);
            transition: 0.2s;
        }
        .filter-group button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 6px 18px var(--accent-glow);
        }

        /* ---------- КАРТОЧКИ ЗАДАЧ ---------- */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .task-card {
            background: var(--card-bg);
            backdrop-filter: blur(var(--backdrop-blur));
            -webkit-backdrop-filter: blur(var(--backdrop-blur));
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-xl);
            padding: 18px 20px;
            box-shadow: var(--shadow-card);
            transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1);
            animation: fadeSlideUp 0.4s ease;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-card.completed {
            opacity: 0.7;
        }
        .task-card.completed .task-title {
            text-decoration: line-through;
        }
        .task-title {
            font-size: 20px;
            font-weight: 650;
            margin-bottom: 6px;
            word-break: break-word;
        }
        .task-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .task-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }
        .task-category {
            font-size: 12px;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 20px;
            background: var(--accent);
            color: #fff;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .task-deadline {
            font-size: 13px;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .progress-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .progress-bar-bg {
            flex: 1;
            height: 10px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .progress-percent {
            font-size: 16px;
            font-weight: 700;
            min-width: 48px;
            text-align: right;
            color: var(--accent);
            transition: color 0.3s;
        }
        /* Новый блок для отображения цели в auto-задачах */
        .task-auto-info {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .task-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* iOS-кнопки с объёмом и анимацией */
        .btn-icon {
            background: var(--btn-gradient);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-strong);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            color: var(--text);
            box-shadow: var(--btn-shadow);
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-icon:active {
            transform: scale(0.88);
            box-shadow: inset 0 3px 12px rgba(0,0,0,0.2);
            background: var(--card-bg-hover);
        }
        .btn-icon::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: radial-gradient(circle, var(--accent) 10%, transparent 10%);
            transform: scale(0);
            opacity: 0;
            transition: transform 0.4s, opacity 0.8s;
        }
        .btn-icon:active::after {
            transform: scale(2.5);
            opacity: 0.15;
            transition: 0s;
        }
        .btn-icon.danger {
            color: var(--danger);
        }
        .progress-btns {
            display: flex;
            gap: 6px;
        }
        .progress-btns button {
            background: var(--btn-gradient);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-strong);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            box-shadow: var(--btn-shadow);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

    </style>
        <script>
        // ==================== ГЛОБАЛЬНЫЕ ДАННЫЕ ====================
        const DEFAULT_CATEGORIES = ['Работа', 'Учёба', 'Дом', 'Здоровье', 'Личное'];
        const CATEGORY_COLORS = ['#8b7cf6','#ff6b6b','#4ecdc4','#ffd93d','#6bcb77','#ff8a5c','#a29bfe','#fd79a8'];
        let tasks = [];
        let categories = [...DEFAULT_CATEGORIES];
        let currentFilter = 'all';
        let currentSort = 'date-desc';
        let editingTaskId = null;
        let theme = localStorage.getItem('todo_theme') || 'dark';

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function saveData() {
            localStorage.setItem('todo_tasks', JSON.stringify(tasks));
            localStorage.setItem('todo_categories', JSON.stringify(categories));
            localStorage.setItem('todo_theme', theme);
        }

        // Нормализация задачи: добавляет недостающие поля для поддержки старых данных
        function normalizeTask(task) {
            if (!task.mode) {
                task.mode = 'manual';
                task.target = null;
                task.completed = null;
            }
            if (task.percent === undefined || task.percent === null) {
                task.percent = 0;
            }
            return task;
        }

        function loadData() {
            const savedTasks = localStorage.getItem('todo_tasks');
            if (savedTasks) {
                tasks = JSON.parse(savedTasks).map(normalizeTask);
            }
            const savedCategories = localStorage.getItem('todo_categories');
            if (savedCategories) categories = JSON.parse(savedCategories);
            theme = localStorage.getItem('todo_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeSelect').value = theme;
        }

        function getCategoryColor(catName) {
            const idx = categories.indexOf(catName);
            return CATEGORY_COLORS[idx % CATEGORY_COLORS.length];
        }

        function escapeHtml(text) {
            return String(text).replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        // ==================== АНИМАЦИЯ ЧИСЕЛ (ПЛАВНАЯ) ====================
        function animateValue(element, start, end, duration = 350) {
            if (start === end) {
                element.textContent = end + '%';
                return;
            }
            const range = end - start;
            const startTime = performance.now();
            function step(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = Math.round(start + range * progress);
                element.textContent = current + '%';
                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    element.textContent = end + '%';
                }
            }
            requestAnimationFrame(step);
        }

        // ==================== ЧАСТИЦЫ (CANVAS) ====================
        const particleCanvas = document.getElementById('particleCanvas');
        const pCtx = particleCanvas.getContext('2d');
        let particles = [];
        function resizeCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        function initParticles() {
            const colors = getComputedStyle(document.body).getPropertyValue('--particle-colors').split(',').map(s => s.trim());
            particles = [];
            for (let i = 0; i < 35; i++) {
                particles.push({
                    x: Math.random() * particleCanvas.width,
                    y: Math.random() * particleCanvas.height,
                    radius: Math.random() * 40 + 10,
                    dx: (Math.random() - 0.5) * 0.5,
                    dy: (Math.random() - 0.5) * 0.5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: Math.random() * 0.15 + 0.05
                });
            }
        }
        function animateParticles() {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach(p => {
                p.x += p.dx;
                p.y += p.dy;
                if (p.x < -p.radius) p.x = particleCanvas.width + p.radius;
                if (p.x > particleCanvas.width + p.radius) p.x = -p.radius;
                if (p.y < -p.radius) p.y = particleCanvas.height + p.radius;
                if (p.y > particleCanvas.height + p.radius) p.y = -p.radius;
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                pCtx.fillStyle = p.color;
                pCtx.globalAlpha = p.alpha;
                pCtx.fill();
                pCtx.globalAlpha = 1.0;
            });
            requestAnimationFrame(animateParticles);
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });
        resizeCanvas();
        initParticles();
        animateParticles();
                    // ==================== ОТРИСОВКА ЗАДАЧ ====================
        function renderTasks() {
            const container = document.getElementById('taskList');
            let filtered = tasks.filter(t => {
                if (currentFilter === 'active') return t.percent < 100;
                if (currentFilter === 'completed') return t.percent === 100;
                if (currentFilter === 'overdue') {
                    if (!t.deadline || t.percent === 100) return false;
                    return new Date(t.deadline) < new Date() && t.percent < 100;
                }
                return true;
            });

            if (currentSort === 'date-desc') filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
            else if (currentSort === 'progress-desc') filtered.sort((a,b) => b.percent - a.percent);
            else if (currentSort === 'deadline-asc') {
                filtered.sort((a,b) => {
                    if (!a.deadline && !b.deadline) return 0;
                    if (!a.deadline) return 1;
                    if (!b.deadline) return -1;
                    return new Date(a.deadline) - new Date(b.deadline);
                });
            }

            container.innerHTML = filtered.map(task => {
                const catColor = getCategoryColor(task.category);
                const isCompleted = task.percent === 100;
                const deadlineText = task.deadline ? new Date(task.deadline).toLocaleDateString('ru') : '';
                const overdue = task.deadline && new Date(task.deadline) < new Date() && task.percent < 100;
                // Для авто-режима показываем цель и выполнено
                const autoInfo = (task.mode === 'auto' && task.target !== null)
                    ? `<div class="task-auto-info" data-task-id="${task.id}">${task.completed ?? 0} / ${task.target}</div>`
                    : '';
                return `
                <div class="task-card ${isCompleted ? 'completed' : ''}" data-id="${task.id}">
                    <div class="task-title">${escapeHtml(task.name)}</div>
                    ${task.desc ? `<div class="task-desc">${escapeHtml(task.desc)}</div>` : ''}
                    <div class="task-meta">
                        <span class="task-category" style="background:${catColor};">${escapeHtml(task.category)}</span>
                        <span class="task-deadline" style="color:${overdue ? 'var(--danger)' : 'var(--text-tertiary)'};">${deadlineText ? '⏰ '+deadlineText : ''}</span>
                    </div>
                    <div class="progress-section">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width:${task.percent}%; background:${task.percent===100 ? 'var(--success)' : 'var(--accent)'};"></div>
                        </div>
                        <span class="progress-percent" data-task-id="${task.id}">${task.percent}%</span>
                    </div>
                    ${autoInfo}
                    <div class="task-actions">
                        <div class="progress-btns">
                            <button onclick="changeProgress('${task.id}', -25)">−25%</button>
                            <button onclick="changeProgress('${task.id}', 25)">+25%</button>
                        </div>
                        <button class="btn-icon" onclick="openEditModal('${task.id}')" title="Редактировать">✏️</button>
                        <button class="btn-icon danger" onclick="confirmDelete('${task.id}')" title="Удалить">🗑️</button>
                    </div>
                </div>`;
            }).join('');
        }

        // Изменение прогресса (универсальное для manual и auto)
        function changeProgress(id, deltaPercent) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            const oldPercent = task.percent;

            if (task.mode === 'manual') {
                let newPercent = Math.min(100, Math.max(0, oldPercent + deltaPercent));
                if (oldPercent === newPercent) return;
                task.percent = newPercent;
                if (newPercent === 100 && !task.completedAt) task.completedAt = new Date().toISOString();
                if (newPercent < 100) task.completedAt = null;
            } else if (task.mode === 'auto') {
                // deltaPercent это 25 или -25, но в авто режиме меняем completed на 25% от target
                const target = task.target || 0;
                if (target <= 0) return;
                let completed = task.completed ?? 0;
                completed += (deltaPercent / 100) * target; // deltaPercent = ±25 -> completed += ±0.25*target
                completed = Math.max(0, completed); // не отрицательное
                task.completed = completed;
                let newPercent = target > 0 ? Math.min(100, Math.round((completed / target) * 100)) : 0;
                task.percent = newPercent;
                if (newPercent === 100 && !task.completedAt) task.completedAt = new Date().toISOString();
                if (newPercent < 100) task.completedAt = null;
            }
            saveData();

            // Обновление DOM элементов карточки
            const card = document.querySelector(`.task-card[data-id="${id}"]`);
            if (!card) return;
            const percentSpan = card.querySelector('.progress-percent');
            const fillBar = card.querySelector('.progress-bar-fill');
            if (percentSpan) {
                animateValue(percentSpan, oldPercent, task.percent, 350);
            }
            if (fillBar) {
                fillBar.style.width = task.percent + '%';
                fillBar.style.background = task.percent === 100 ? 'var(--success)' : 'var(--accent)';
            }
            // Обновление информации auto-режима
            const autoInfo = card.querySelector('.task-auto-info');
            if (autoInfo && task.mode === 'auto' && task.target !== null) {
                autoInfo.textContent = `${task.completed ?? 0} / ${task.target}`;
            }
            // Обновление класса completed
            if (task.percent === 100) {
                card.classList.add('completed');
                const title = card.querySelector('.task-title');
                if (title) title.style.textDecoration = 'line-through';
            } else {
                card.classList.remove('completed');
                const title = card.querySelector('.task-title');
                if (title) title.style.textDecoration = 'none';
            }
            // Если открыта страница статистики, обновить её
            if (document.getElementById('page-stats').classList.contains('active')) {
                updateStats();
            }
        }

        // ==================== СОЗДАНИЕ, РЕДАКТИРОВАНИЕ, УДАЛЕНИЕ ====================
        function addTask(name, desc, category, mode, percentOrTarget, completedVal, deadline) {
            let percent, target = null, completed = null;
            if (mode === 'manual') {
                percent = parseInt(percentOrTarget);
            } else {
                target = parseFloat(percentOrTarget);
                completed = completedVal !== undefined ? parseFloat(completedVal) : 0;
                percent = target > 0 ? Math.min(100, Math.round((completed / target) * 100)) : 0;
            }
            const task = {
                id: Date.now().toString(36) + Math.random().toString(36).substr(2,5),
                name,
                desc,
                category,
                mode,
                percent,
                target,
                completed,
                deadline: deadline || null,
                createdAt: new Date().toISOString(),
                completedAt: percent === 100 ? new Date().toISOString() : null
            };
            tasks.push(task);
            saveData();
            renderAll();
        }

        function updateTask(id, updates) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            // Обновляем поля
            if (updates.mode !== undefined) task.mode = updates.mode;
            if (updates.name !== undefined) task.name = updates.name;
            if (updates.desc !== undefined) task.desc = updates.desc;
            if (updates.category !== undefined) task.category = updates.category;
            if (updates.deadline !== undefined) task.deadline = updates.deadline;

            if (task.mode === 'manual') {
                if (updates.percent !== undefined) {
                    task.percent = parseInt(updates.percent);
                }
                task.target = null;
                task.completed = null;
            } else {
                if (updates.target !== undefined) task.target = parseFloat(updates.target);
                if (updates.completed !== undefined) task.completed = parseFloat(updates.completed);
                // Пересчёт процента
                if (task.target > 0) {
                    task.percent = Math.min(100, Math.round(((task.completed ?? 0) / task.target) * 100));
                } else {
                    task.percent = 0;
                }
            }
            if (task.percent === 100 && !task.completedAt) task.completedAt = new Date().toISOString();
            if (task.percent < 100) task.completedAt = null;

            saveData();
            renderAll();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveData();
            renderAll();
        }

        function confirmDelete(id) {
            document.getElementById('confirmModal').classList.add('active');
            document.getElementById('confirmDeleteBtn').onclick = () => {
                deleteTask(id);
                closeModal();
            };
        }

        // ==================== МОДАЛЬНЫЕ ОКНА ====================
        function openModal(title) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('taskModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
            document.getElementById('confirmModal').classList.remove('active');
            editingTaskId = null;
        }

        // Переключение видимости блоков в зависимости от выбранного режима
        function toggleProgressMode() {
            const mode = document.querySelector('input[name="progressMode"]:checked').value;
            document.getElementById('manualPercentBlock').style.display = (mode === 'manual') ? 'block' : 'none';
            document.getElementById('autoPercentBlock').style.display = (mode === 'auto') ? 'block' : 'none';
        }

        function openAddModal() {
            document.getElementById('modalName').value = '';
            document.getElementById('modalDesc').value = '';
            document.getElementById('modalDeadline').value = '';
            document.getElementById('modalTarget').value = '';
            document.getElementById('modalCompleted').value = '0';
            // Установить режим manual по умолчанию
            document.querySelector('input[name="progressMode"][value="manual"]').checked = true;
            toggleProgressMode();
            // Сбросить выбор процента на 0
            document.querySelectorAll('#percentSelector .percent-option').forEach(el => el.classList.remove('selected'));
            document.querySelector('#percentSelector .percent-option[data-val="0"]').classList.add('selected');
            renderModalCategories();
            openModal('Новая задача');
        }

        function openEditModal(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            editingTaskId = id;
            document.getElementById('modalName').value = task.name;
            document.getElementById('modalDesc').value = task.desc || '';
            document.getElementById('modalDeadline').value = task.deadline || '';
            // Установить режим
            const modeRadio = document.querySelector(`input[name="progressMode"][value="${task.mode}"]`);
            if (modeRadio) modeRadio.checked = true;
            toggleProgressMode();
            // Заполнить соответствующие поля
            if (task.mode === 'manual') {
                document.querySelectorAll('#percentSelector .percent-option').forEach(el => {
                    el.classList.toggle('selected', el.dataset.val == task.percent);
                });
                document.getElementById('modalTarget').value = '';
                document.getElementById('modalCompleted').value = '0';
            } else {
                document.getElementById('modalTarget').value = task.target ?? '';
                document.getElementById('modalCompleted').value = task.completed ?? 0;
            }
            renderModalCategories();
            document.getElementById('modalCategory').value = task.category;
            openModal('Редактирование');
        }

        function saveModal() {
            const name = document.getElementById('modalName').value.trim();
            if (!name) { alert('Введите название задачи'); return; }
            const desc = document.getElementById('modalDesc').value.trim();
            const category = document.getElementById('modalCategory').value;
            const deadline = document.getElementById('modalDeadline').value;
            const mode = document.querySelector('input[name="progressMode"]:checked').value;

            if (mode === 'manual') {
                const selectedPercent = document.querySelector('#percentSelector .percent-option.selected');
                const percent = selectedPercent ? selectedPercent.dataset.val : '0';
                if (editingTaskId) {
                    updateTask(editingTaskId, { name, desc, category, deadline, mode, percent: parseInt(percent) });
                } else {
                    addTask(name, desc, category, mode, percent, undefined, deadline);
                }
            } else { // auto
                const targetStr = document.getElementById('modalTarget').value.trim();
                const completedStr = document.getElementById('modalCompleted').value.trim();
                const target = parseFloat(targetStr);
                const completed = completedStr !== '' ? parseFloat(completedStr) : 0;
                if (isNaN(target) || target <= 0) {
                    alert('Введите положительное целевое значение');
                    return;
                }
                if (isNaN(completed) || completed < 0) {
                    alert('Выполненное значение не может быть отрицательным');
                    return;
                }
                if (editingTaskId) {
                    updateTask(editingTaskId, { name, desc, category, deadline, mode, target, completed });
                } else {
                    addTask(name, desc, category, mode, target, completed, deadline);
                }
            }
            closeModal();
        }

        // Обработчик переключения режима в модальном окне
        document.querySelectorAll('input[name="progressMode"]').forEach(radio => {
            radio.addEventListener('change', toggleProgressMode);
        });
                    // ==================== КАТЕГОРИИ ====================
        function renderCategoryFilter() {
            const select = document.getElementById('categoryFilter');
            select.innerHTML = '<option value="all">Все категории</option>' +
                categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
        }

        function renderModalCategories() {
            const select = document.getElementById('modalCategory');
            select.innerHTML = categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
        }

        function renderCategoryList() {
            const ul = document.getElementById('categoryList');
            ul.innerHTML = categories.map(c => `
                <li style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--card-bg); backdrop-filter:blur(10px); margin-bottom:8px; border-radius:20px; border:1px solid var(--border);">
                    <span>🎨 ${escapeHtml(c)}</span>
                    <button class="btn-icon danger" onclick="deleteCategory('${escapeHtml(c)}')" style="width:36px;height:36px;">🗑️</button>
                </li>`).join('');
        }

        function addCategory(name) {
            const trimmed = name.trim();
            if (!trimmed || categories.includes(trimmed)) return;
            categories.push(trimmed);
            saveData();
            renderAll();
        }

        function deleteCategory(name) {
            if (categories.length <= 1) return;
            categories = categories.filter(c => c !== name);
            tasks.forEach(t => { if (t.category === name) t.category = categories[0]; });
            saveData();
            renderAll();
        }

        // ==================== СТАТИСТИКА ====================
        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.percent === 100).length;
            const overdue = tasks.filter(t => t.deadline && new Date(t.deadline) < new Date() && t.percent < 100).length;
            const activeTasks = tasks.filter(t => t.percent < 100);
            const avgPercent = activeTasks.length ? Math.round(activeTasks.reduce((s,t) => s + t.percent, 0) / activeTasks.length) : 0;

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">Всего задач</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:var(--success);">${completed}</div>
                    <div class="stat-label">Выполнено</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" style="color:var(--danger);">${overdue}</div>
                    <div class="stat-label">Просрочено</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgPercent}%</div>
                    <div class="stat-label">Средний прогресс</div>
                </div>
            `;

            drawWeeklyChart();
            drawCategoryChart();
        }

        function drawWeeklyChart() {
            const canvas = document.getElementById('weeklyChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0,0,w,h);
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                days.push(d.toLocaleDateString('ru', {weekday:'short'}));
            }
            const counts = Array(7).fill(0);
            tasks.forEach(t => {
                if (t.percent === 100 && t.completedAt) {
                    const compDate = new Date(t.completedAt).toLocaleDateString();
                    const today = new Date();
                    for (let i=6; i>=0; i--) {
                        const d = new Date(); d.setDate(d.getDate()-i);
                        if (d.toLocaleDateString() === compDate) counts[6-i]++;
                    }
                }
            });
            const maxVal = Math.max(...counts, 1);
            const barWidth = (w-40)/7;
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-tertiary');
            ctx.font = 'bold 10px system-ui';
            days.forEach((day,i) => {
                const x = 20 + i*barWidth;
                ctx.fillText(day, x+2, h-4);
                const barH = (counts[i]/maxVal)*(h-30);
                const gradient = ctx.createLinearGradient(x, h-20, x, h-20-barH);
                gradient.addColorStop(0, getComputedStyle(document.body).getPropertyValue('--accent'));
                gradient.addColorStop(1, getComputedStyle(document.body).getPropertyValue('--success'));
                ctx.fillStyle = gradient;
                ctx.fillRect(x, h-20-barH, barWidth-6, barH);
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text');
                ctx.fillText(counts[i], x+2, h-24-barH);
            });
        }

        function drawCategoryChart() {
            const canvas = document.getElementById('categoryChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            ctx.clearRect(0,0,w,h);
            const catCounts = {};
            tasks.forEach(t => { catCounts[t.category] = (catCounts[t.category]||0)+1; });
            const entries = Object.entries(catCounts);
            if (entries.length===0) return;
            const total = entries.reduce((s,e)=>s+e[1],0);
            let startAngle = -Math.PI/2;
            entries.forEach(([cat, count]) => {
                const sliceAngle = (count/total)*2*Math.PI;
                ctx.fillStyle = getCategoryColor(cat);
                ctx.beginPath();
                ctx.moveTo(w/2, h/2);
                ctx.arc(w/2, h/2, 70, startAngle, startAngle+sliceAngle);
                ctx.closePath();
                ctx.fill();
                startAngle += sliceAngle;
            });
        }

        // ==================== ТЕМЫ ====================
        function setTheme(t) {
            theme = t;
            document.documentElement.setAttribute('data-theme', theme);
            saveData();
            document.getElementById('themeSelect').value = theme;
            initParticles();
        }

        // ==================== ЭКСПОРТ / ИМПОРТ ====================
        function exportData() {
            const data = { tasks, categories, theme };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'tasks_backup.json'; a.click();
            URL.revokeObjectURL(url);
        }
        function importData(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.tasks && data.categories) {
                        tasks = data.tasks.map(normalizeTask); // нормализуем импортированные задачи
                        categories = data.categories;
                        if (data.theme) setTheme(data.theme);
                        saveData();
                        renderAll();
                    }
                } catch (err) { alert('Ошибка импорта файла'); }
            };
            reader.readAsText(file);
        }

        // ==================== ПОЛНАЯ ПЕРЕРИСОВКА ====================
        function renderAll() {
            renderTasks();
            renderCategoryFilter();
            renderCategoryList();
            updateStats();
        }

        // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================
        document.getElementById('addTaskBtn').addEventListener('click', openAddModal);
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
        document.getElementById('saveModalBtn').addEventListener('click', saveModal);
        document.getElementById('cancelConfirmBtn').addEventListener('click', closeModal);
        document.querySelectorAll('#percentSelector .percent-option').forEach(el => {
            el.addEventListener('click', function() {
                document.querySelectorAll('#percentSelector .percent-option').forEach(e => e.classList.remove('selected'));
                this.classList.add('selected');
            });
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            const themes = ['dark','light','neon','glass','space','pastel'];
            const idx = themes.indexOf(theme);
            const next = themes[(idx+1)%themes.length];
            setTheme(next);
        });
        document.getElementById('themeSelect').addEventListener('change', (e) => setTheme(e.target.value));

        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            if (e.target.value === 'all') currentFilter = 'all';
            else currentFilter = e.target.value;
            renderTasks();
        });
        document.getElementById('sortSelect').addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderTasks();
        });
        document.querySelectorAll('#statusFilters button').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#statusFilters button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderTasks();
            });
        });

        document.getElementById('addCategoryBtn').addEventListener('click', () => {
            const input = document.getElementById('newCategoryInput');
            addCategory(input.value);
            input.value = '';
        });
        document.getElementById('exportBtn').addEventListener('click', exportData);
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => {
            if (e.target.files[0]) importData(e.target.files[0]);
        });

        // Табы
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const page = this.dataset.page;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-'+page).classList.add('active');
                if (page === 'stats') updateStats();
            });
        });

        // Закрытие модалок по клику на оверлей
        document.getElementById('taskModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.getElementById('confirmModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        loadData();
        setTheme(theme);
        renderAll();
    </script>
</body>
</html>
